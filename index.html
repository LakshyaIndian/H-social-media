<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="H — Your personal offline micro-social space">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <title>H</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="./style.css">

  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 99999;
      transition: opacity 0.3s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    .splash-letter {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -3px;
      line-height: 1;
    }
    .splash-bar {
      width: 40px;
      height: 3px;
      background: #1d9bf0;
      border-radius: 99px;
      animation: splashpulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes splashpulse {
      from { width: 24px; opacity: 0.5; }
      to   { width: 56px; opacity: 1; }
    }
  </style>

</head>
<body>

  <!-- Splash screen — hidden by JS once app is ready -->

  <div id="splash">
    <span class="splash-letter">H</span>
    <div class="splash-bar"></div>
  </div>

  <!-- App mounts here -->

  <div id="app"></div>

  <script src="./app.js"></script>

</body>
</html>
