<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FF7"/>
      <stop offset="50%" style="stop-color:#FF2D55"/>
      <stop offset="100%" style="stop-color:#FF7A18"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- H letter -->
  <rect x="44" y="52" width="20" height="88" rx="6" fill="white" opacity="0.95"/>
  <rect x="128" y="52" width="20" height="88" rx="6" fill="white" opacity="0.95"/>
  <rect x="44" y="82" width="104" height="20" rx="6" fill="white" opacity="0.95"/>
  <!-- Camera lens inside H crossbar -->
  <circle cx="96" cy="92" r="16" fill="url(#lens)"/>
  <circle cx="96" cy="92" r="10" fill="none" stroke="#FF2D55" stroke-width="2.5"/>
  <circle cx="96" cy="92" r="4" fill="#FF2D55"/>
  <circle cx="102" cy="86" r="2" fill="white" opacity="0.8"/>
</svg>
